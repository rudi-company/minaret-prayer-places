name: Update Prayer Places

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 * *'  # 3am on the 1st of every month

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python scripts/populate.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add places.json
          git diff --staged --quiet || git commit -m "chore: refresh prayer places from OpenStreetMap"
          git push
